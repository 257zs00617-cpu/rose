<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ろせのダイス・スタジオ</title>
    <style>
      /* 全体のスタイル設定 */
      body {
        font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
        line-height: 1.8;
        color: #333;
        background-color: #f8f9fa;
        margin: 0;
        padding: 0;
      }
      .container {
        max-width: 900px;
        margin: 0 auto;
        padding: 40px 20px;
      }
      
      /* ヘッダー・メインタイトル */
      header {
        text-align: center;
        padding: 60px 0 40px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: #fff;
        border-radius: 8px;
        margin-bottom: 40px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      }
      header h1 {
        margin: 0;
        font-size: 2.5rem;
        letter-spacing: 2px;
      }
      header p {
        margin: 10px 0 0;
        opacity: 0.9;
        font-size: 1.1rem;
      }

      /* セクション共通スタイル */
      section {
        background: #fff;
        padding: 30px;
        margin-bottom: 30px;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      }
      h2, h3 {
        color: #4a148c;
        border-bottom: 2px solid #e0b0ff;
        padding-bottom: 8px;
        margin-top: 0;
      }
      h3 {
        border-bottom: 1px solid #ddd;
        color: #333;
        margin-top: 20px;
      }

      /* リストとリンクの装飾 */
      ul {
        padding-left: 20px;
      }
      li {
        margin-bottom: 8px;
      }
      a {
        color: #667eea;
        text-decoration: none;
        transition: color 0.3s;
      }
      a:hover {
        color: #764ba2;
        text-decoration: underline;
      }

      /* テーブル（Skills / History）の装飾 */
      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 15px;
      }
      th, td {
        padding: 12px 15px;
        text-align: left;
        border-bottom: 1px solid #eee;
      }
      th {
        width: 25%;
        color: #4a148c;
        background-color: #fdfbfe;
        font-weight: 600;
      }

      /* タイムライン風の経歴スタイル */
      .history-table th {
        width: 25%;
      }
      .achievement-badge {
        display: inline-block;
        background-color: #e8eaf6;
        color: #3f51b5;
        padding: 2px 8px;
        border-radius: 4px;
        font-size: 0.85rem;
        font-weight: bold;
        margin-right: 5px;
      }

      /* --- ダイス機能の追加スタイル --- */
      .dice-panel {
        display: flex;
        flex-wrap: wrap;
        gap: 15px;
        align-items: center;
        background: #f3e5f5;
        padding: 20px;
        border-radius: 6px;
        margin-bottom: 20px;
      }
      .dice-select-group {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .dice-select-group select {
        padding: 6px 12px;
        border-radius: 4px;
        border: 1px solid #b39ddb;
        font-size: 1rem;
        background: #fff;
      }
      .dice-btn {
        background: linear-gradient(135deg, #7b1fa2 0%, #4a148c 100%);
        color: white;
        border: none;
        padding: 8px 20px;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
        font-size: 1rem;
        transition: transform 0.1s, opacity 0.2s;
        box-shadow: 0 2px 5px rgba(0,0,0,0.2);
      }
      .dice-btn:hover {
        opacity: 0.9;
      }
      .dice-btn:active {
        transform: scale(0.95);
      }
      .dice-result-container {
        min-height: 80px;
        background: #fafafa;
        border: 2px dashed #b39ddb;
        border-radius: 6px;
        padding: 15px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }
      .dice-list {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-bottom: 10px;
      }
      
      /* ダイスの基本デザイン（通常は紫） */
      .dice-individual {
        display: inline-flex;
        justify-content: center;
        align-items: center;
        width: 45px;
        height: 45px;
        background: #764ba2;
        color: white;
        border-radius: 8px;
        font-weight: bold;
        font-size: 1.2rem;
        box-shadow: 0 3px 6px rgba(0,0,0,0.16);
      }

      /* 1〜5が出た時の青いダイス（クリティカル） */
      .dice-critical {
        background: linear-gradient(135deg, #2196f3 0%, #1565c0 100%) !important;
        box-shadow: 0 0 10px rgba(33, 150, 243, 0.6);
      }

      /* 96〜100が出た時の赤いダイス（ファンブル） */
      .dice-fumble {
        background: linear-gradient(135deg, #e91e63 0%, #c2185b 100%) !important;
        box-shadow: 0 0 10px rgba(233, 30, 99, 0.6);
      }

      /* ダイスが振られたときのアニメーション */
      .rolling {
        animation: rollEffect 0.4s ease-out;
      }
      @keyframes rollEffect {
        0% { transform: rotate(0deg) scale(0.5); opacity: 0.5; }
        50% { transform: rotate(180deg) scale(1.2); }
        100% { transform: rotate(360deg) scale(1); opacity: 1; }
      }
      .total-score {
        font-size: 1.3rem;
        font-weight: bold;
        color: #4a148c;
      }
      .placeholder-text {
        color: #888;
        font-style: italic;
      }

      /* フッター */
      footer {
        text-align: center;
        padding: 20px;
        color: #888;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>

      <header>
        <h1>ろせのダイス・スタジオ</h1>
        <p>ZEN大学で新しいクリエイティブに挑戦中</p>
      </header>

        <div class="dice-panel">
          <div class="dice-select-group">
            <select id="dice-count">
              <option value="1">1</option>
